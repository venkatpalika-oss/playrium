<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Playrium — Philippines Collection</title>
<meta name="description" content="Explore Playrium's Philippines Collection: premium, physics-driven browser toys inspired by Filipino games and culture.">
<meta property="og:type" content="website">
<meta property="og:title" content="Playrium — Philippines Collection">
<meta property="og:description" content="Toys inspired by Filipino games and culture — premium physics-driven experiences.">
<meta property="og:image" content="https://www.playrium.fun/favicon.png">
<meta property="og:url" content="https://www.playrium.fun/philippines.html">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Playrium — Philippines Collection">
<meta name="twitter:description" content="Toys inspired by Filipino games and culture — premium physics-driven experiences.">
<meta name="twitter:image" content="https://www.playrium.fun/favicon.png">
<link rel="canonical" href="https://www.playrium.fun/philippines.html">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
--bg-deep:#0a0a0f; --bg-mid:#141420;
--chalk:#f4f0e6; --chalk-dim:#9a97a8;
--ui-glass:rgba(244,240,230,.06); --ui-glass-border:rgba(244,240,230,.14);
--font-display:'Fredoka', system-ui, sans-serif; --font-chalk:'Kalam', cursive;
}
*{box-sizing:border-box;}
html,body{ margin:0; padding:0; width:100%; min-height:100%; background:var(--bg-deep);
font-family:var(--font-display); -webkit-tap-highlight-color:transparent; }
body{ overflow-x:hidden; }
.bg-glow{ position:fixed; inset:0; z-index:0; pointer-events:none;
background:
radial-gradient(circle at 20% 20%, rgba(0,56,168,.10), transparent 40%),
radial-gradient(circle at 80% 10%, rgba(252,209,22,.08), transparent 45%),
radial-gradient(circle at 50% 90%, rgba(206,17,38,.06), transparent 50%);
}
.back-link{ position:relative; z-index:1; display:inline-block; margin:2rem 0 0 2rem; color:var(--chalk-dim);
font-family:var(--font-chalk); font-size:.95rem; text-decoration:none; opacity:.7; transition:opacity .25s ease; }
.back-link:hover{ opacity:1; }
header{ position:relative; z-index:1; text-align:center; padding:2rem 1.5rem 3rem; }
.eyebrow{ color:var(--chalk); opacity:.7; letter-spacing:.3em; text-transform:uppercase; font-size:.75rem;
font-weight:500; margin:0 0 1rem; animation:fadeUp .8s ease both; }
.logo{ font-weight:700; color:var(--chalk); font-size:clamp(2.6rem,7vw,5.2rem); margin:0; letter-spacing:-.01em;
text-shadow:0 4px 40px rgba(0,56,168,.2); animation:fadeUp .9s cubic-bezier(.2,.8,.2,1) .1s both; }
.tagline{ font-family:var(--font-chalk); color:var(--chalk-dim); font-size:clamp(1rem,2.3vw,1.3rem);
margin:1.2rem 0 0; opacity:.85; animation:fadeUp .9s ease .35s both; }
@keyframes fadeUp{ from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:translateY(0);} }
.grid{ position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:1rem 1.5rem 6rem;
display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:1.75rem; }
.card{ position:relative; display:block; border-radius:1.4rem; overflow:hidden; text-decoration:none;
aspect-ratio:4/3; background:#1a1a24; border:1px solid var(--ui-glass-border);
box-shadow:0 20px 40px rgba(0,0,0,.35);
opacity:0; transform:translateY(20px); animation:cardIn .7s cubic-bezier(.2,.8,.2,1) forwards;
transition:transform .35s cubic-bezier(.2,.8,.2,1), box-shadow .35s ease, border-color .35s ease; }
@keyframes cardIn{ to{ opacity:1; transform:translateY(0); } }
.card:hover{ transform:translateY(-6px) scale(1.015); box-shadow:0 28px 60px rgba(0,0,0,.55); }
.card.locked{ cursor:default; }
.card.locked:hover{ transform:none; box-shadow:0 20px 40px rgba(0,0,0,.35); }
.card-flag{ position:absolute; inset:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center;
font-size:5.5rem; transition:transform .6s cubic-bezier(.2,.8,.2,1), filter .4s ease; filter:saturate(1.02) brightness(.94); }
.card:not(.locked):hover .card-flag{ transform:scale(1.06); filter:saturate(1.1) brightness(1); }
.card.locked .card-flag{ filter:grayscale(.6) brightness(.5); }
.card-country-flag{ position:absolute; top:.8rem; right:.8rem; z-index:4; width:32px; height:24px; border-radius:.3rem; overflow:hidden;
box-shadow:0 4px 12px rgba(0,0,0,.5); border:1px solid rgba(244,240,230,.35); }
.card-country-flag img{ width:100%; height:100%; object-fit:cover; display:block; }
.card::before{ content:''; position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,0) 40%, rgba(10,10,15,.55) 70%, rgba(10,10,15,.92) 100%); z-index:1; pointer-events:none; }
.card::after{ content:''; position:absolute; inset:0; border-radius:1.4rem; z-index:2; pointer-events:none;
box-shadow:inset 0 0 0 1.5px transparent; transition:box-shadow .35s ease; }
.card:not(.locked):hover::after{ box-shadow:inset 0 0 0 1.5px var(--accent), 0 0 24px var(--accent); }
.card-content{ position:absolute; left:0; right:0; bottom:0; z-index:3; padding:1.3rem 1.4rem 1.2rem;
display:flex; flex-direction:column; gap:.35rem; }
.accent-dot{ width:9px; height:9px; border-radius:50%; background:var(--accent); display:inline-block;
margin-right:.5rem; box-shadow:0 0 12px var(--accent); }
.card-title{ color:var(--chalk); font-weight:600; font-size:1.35rem; margin:0; display:flex; align-items:center; }
.card-tagline{ font-family:var(--font-chalk); color:var(--chalk-dim); font-size:.88rem; margin:0; }
.card-cta{ margin-top:.5rem; align-self:flex-start; padding:.4rem 1rem; border-radius:999px; font-size:.78rem;
font-weight:600; color:#0a0a0f; background:var(--chalk); opacity:0; transform:translateY(6px);
transition:all .35s cubic-bezier(.2,.8,.2,1); }
.card:not(.locked):hover .card-cta{ opacity:1; transform:translateY(0); }
.card-badge{ margin-top:.5rem; align-self:flex-start; padding:.4rem 1rem; border-radius:999px; font-size:.78rem;
font-weight:600; color:var(--chalk-dim); background:rgba(244,240,230,.1); border:1px solid var(--ui-glass-border); }
footer{ position:relative; z-index:1; text-align:center; padding:2rem 1.5rem 3rem; color:var(--chalk-dim); }
footer p{ font-size:.82rem; font-family:var(--font-chalk); }
@media (prefers-reduced-motion:reduce){
*{ animation-duration:.001s !important; transition-duration:.001s !important; }
}
</style>
</head>
<body>
<div class="bg-glow"></div>
<a class="back-link" href="index.html">&larr; All Countries</a>
<header>
<p class="eyebrow">Playrium &middot; Philippines</p>
<h1 class="logo">Philippines Collection</h1>
<p class="tagline">Physics toys inspired by Filipino games, festivals, and island life.</p>
</header>
<div class="grid" id="grid"></div>
<footer><p>Playrium &middot; built with vanilla HTML, CSS &amp; JavaScript &middot; no frameworks, no backend</p></footer>
<script>
const GAMES = [
{ title:'Sungka Streak', tagline:'Time The Sow. Fill The Store.', href:'sungka-streak.html', accent:'#0038A8', emoji:'🐚', bg:'linear-gradient(135deg,#0a1a4d,#1a1a24)', live:true },
{ title:'Tinikling Tempo', tagline:'Hop Between The Clapping Poles.', href:'tinikling-tempo.html', accent:'#CE1126', emoji:'🎋', bg:'linear-gradient(135deg,#3a1218,#1a1a24)', live:true },
{ title:'Parol Glow', tagline:'Spark The Star Lantern Alight.', href:'parol-glow.html', accent:'#FCD116', emoji:'⭐', bg:'linear-gradient(135deg,#3a3012,#1a1a24)', live:true },
{ title:'Jeepney Jam', tagline:'Weave The Streets. Stack The Fares.', href:'jeepney-jam.html', accent:'#2f8f86', emoji:'🚌', bg:'linear-gradient(135deg,#123a30,#1a1a24)', live:true },
];
const grid = document.getElementById('grid');
GAMES.forEach((g, i) => {
const el = document.createElement(g.live ? 'a' : 'div');
el.className = 'card' + (g.live ? '' : ' locked');
if (g.live) el.href = g.href;
el.style.setProperty('--accent', g.accent);
el.style.animationDelay = (i * 0.06) + 's';
el.innerHTML = `
<div class="card-flag" style="background:${g.bg}">${g.emoji}</div>
<div class="card-country-flag"><img src="https://flagcdn.com/ph.svg" alt="Philippines flag"></div>
<div class="card-content">
<p class="card-title"><span class="accent-dot"></span>${g.title}</p>
<p class="card-tagline">${g.tagline}</p>
${g.live ? '<span class="card-cta">Play &rarr;</span>' : '<span class="card-badge">Coming Soon</span>'}
</div>
`;
grid.appendChild(el);
});
</script>
</body>
</html>
