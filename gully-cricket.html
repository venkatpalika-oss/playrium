<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gully Cricket™ — Every Street Has A Legend.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   GULLY CRICKET™ — Playrium
   Design tokens
   ============================================================ */
:root{
  --sky-top:#2a1f3d;
  --sky-mid:#a24a5e;
  --sky-horizon:#ff9c5b;
  --sky-glow:#ffd08a;
  --wall-terracotta:#c1613f;
  --wall-terracotta-dark:#9c4a30;
  --wall-ochre:#d99a4e;
  --ground:#8a6a4f;
  --ground-dark:#6b4e39;
  --shadow-indigo:#241a30;
  --turquoise:#4fb3a9;
  --turquoise-dark:#357b74;
  --chalk:#f4efe2;
  --chalk-dim:#c9c2b0;
  --ui-charcoal:#18120f;
  --ui-charcoal-soft:#241b16;
  --ui-glass: rgba(244,239,226,0.10);
  --ui-glass-border: rgba(244,239,226,0.18);
  --accent-mango:#ffb238;
  --accent-rose:#e8637a;
  --leaf:#8fae4f;
  --font-display:'Fredoka', system-ui, sans-serif;
  --font-chalk:'Kalam', cursive;
}

*{box-sizing:border-box;}
html,body{
  margin:0; padding:0; width:100%; height:100%;
  overflow:hidden; background:var(--ui-charcoal);
  font-family:var(--font-display);
  -webkit-tap-highlight-color: transparent;
  user-select:none;
  touch-action: manipulation;
}

#app{
  position:relative; width:100vw; height:100vh; height:100dvh;
  overflow:hidden;
}

/* ============================================================
   SCENE / PARALLAX LAYERS
   ============================================================ */
#scene{
  position:absolute; inset:0;
  transform-origin:50% 62%;
  transition: transform .9s cubic-bezier(.22,1,.36,1);
  will-change: transform;
}
#scene.zoom-in{ transform: scale(1.06); }
#scene.zoom-six{ transform: scale(0.94) translateY(1.5%); }
#scene.zoom-catch{ transform: scale(1.16) translateY(-2%); transition: transform .18s cubic-bezier(.2,.9,.3,1); }

.layer{ position:absolute; inset:0; pointer-events:none; }
.layer > *{ pointer-events:auto; }

#sky{
  background:
    radial-gradient(80% 60% at 50% 0%, var(--sky-glow) 0%, transparent 55%),
    linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 48%, var(--sky-horizon) 100%);
}
.sun{
  position:absolute; left:50%; top:8%; width:11vmin; height:11vmin;
  background: radial-gradient(circle, #fff2cf 0%, var(--accent-mango) 55%, transparent 72%);
  border-radius:50%; transform:translate(-50%,-50%);
  filter: blur(0.5px);
  opacity:.9;
}

.kite{ position:absolute; top:14%; left:38%; width:5vmin; height:6vmin; animation: kiteDrift 7s ease-in-out infinite; cursor:pointer; transform-origin:50% 50%;}
.kite svg{ width:100%; height:100%; filter:drop-shadow(0 4px 6px rgba(0,0,0,.25)); }
@keyframes kiteDrift{
  0%,100%{ transform: translate(0,0) rotate(-6deg); }
  50%{ transform: translate(3vmin,-2vmin) rotate(6deg); }
}
.kite.dip{ animation: kiteDip .6s ease-out; }
@keyframes kiteDip{ 0%{transform:translateY(0) rotate(0deg);} 40%{transform:translateY(4vmin) rotate(14deg);} 100%{transform:translateY(0) rotate(-6deg);} }

.crow{ position:absolute; top:26%; left:57%; width:2.6vmin; height:2.6vmin; cursor:pointer; }
.crow svg{ width:100%; height:100%; }
.crow.fly{ animation: crowFly 1.1s ease-in forwards; }
@keyframes crowFly{ to{ transform: translate(30vmin,-18vmin) rotate(12deg); opacity:0; } }

#rooftops{ }
.building{ position:absolute; bottom:26%; width:26%; height:40%; border-radius:6px 6px 0 0; box-shadow: inset 0 -14px 24px rgba(0,0,0,.18); }
.b1{ left:6%; height:34%; background:linear-gradient(180deg, var(--wall-ochre), var(--wall-terracotta-dark)); }
.b2{ left:60%; height:46%; width:32%; background:linear-gradient(180deg, var(--wall-terracotta), var(--wall-terracotta-dark)); }
.b3{ left:88%; height:30%; width:16%; background:linear-gradient(180deg, var(--wall-ochre), var(--wall-terracotta-dark)); }
.window{ position:absolute; width:16%; height:22%; background:var(--shadow-indigo); border-radius:3px; box-shadow: 0 0 0 3px rgba(244,239,226,.25) inset; }
.uncle-window{ top:20%; left:38%; width:22%; height:26%; cursor:pointer; transition: box-shadow .2s; }
.uncle-window .curtain{ position:absolute; inset:8%; background:var(--accent-rose); border-radius:2px; opacity:.85; transition: transform .25s ease; transform-origin:top; }
.uncle-window:hover .curtain{ transform: scaleX(.85) rotate(-2deg); }
.uncle-silhouette{ position:absolute; inset:10%; border-radius:2px; background:#120c10; opacity:0; transform:translateY(10px); transition: all .25s ease; }
.uncle-window.angry .uncle-silhouette{ opacity:1; transform:translateY(0); }
.uncle-window.angry{ box-shadow: 0 0 0 3px var(--accent-rose) inset, 0 0 18px rgba(232,99,122,.6); }

.clothesline{ position:absolute; top:38%; left:26%; width:26%; height:6%; }
.clothesline::before{ content:''; position:absolute; left:0; right:0; top:0; height:2px; background:rgba(20,15,12,.5); }
.clothesline span{ position:absolute; top:1px; width:9%; height:80%; border-radius:2px 2px 6px 6px; transform-origin:top center; animation: swayCloth 3.2s ease-in-out infinite; }
.clothesline span:nth-child(1){ left:6%; background:var(--turquoise); animation-delay:0s; }
.clothesline span:nth-child(2){ left:38%; background:var(--accent-mango); animation-delay:.4s; }
.clothesline span:nth-child(3){ left:70%; background:var(--chalk-dim); animation-delay:.8s; }
@keyframes swayCloth{ 0%,100%{ transform: rotate(-4deg); } 50%{ transform: rotate(4deg); } }
.clothesline.tug span{ animation-duration: 0.9s; }

#midground{ }
.pigeon{ position:absolute; bottom:19%; left:22%; width:3.4vmin; height:3vmin; cursor:pointer; transform-origin:50% 100%; }
.pigeon svg{ width:100%; height:100%; }
.pigeon.peck{ animation: peck .5s ease-in-out; }
@keyframes peck{ 0%,100%{ transform: rotate(0);} 50%{ transform: rotate(18deg) translateY(2px); } }
.pigeon.fly{ transition: left .7s ease, bottom .7s ease, transform .7s ease; }

.dog{ position:absolute; bottom:15%; left:47%; width:8vmin; height:5vmin; cursor:pointer; }
.dog svg{ width:100%; height:100%; }
.dog .tail{ transform-origin: 92% 40%; animation: none; }
.dog.wag .tail{ animation: wag .25s ease-in-out 4; }
@keyframes wag{ 0%,100%{ transform: rotate(0deg);} 50%{ transform: rotate(-28deg);} }
.dog.chase{ transition: left 1s cubic-bezier(.3,.8,.4,1); }

.scooter{ position:absolute; bottom:12%; left:90%; width:11vmin; height:8vmin; cursor:pointer; transform-origin:50% 100%; }
.scooter svg{ width:100%; height:100%; }
.scooter.wobble{ animation: scooterWobble .5s ease-in-out; }
@keyframes scooterWobble{ 0%,100%{ transform: rotate(0);} 25%{ transform: rotate(-3deg);} 75%{ transform: rotate(3deg);} }

/* ============================================================
   STREET / GAMEPLAY PLANE
   ============================================================ */
#street{ }
.ground{ position:absolute; left:0; right:0; bottom:0; height:26%;
  background: linear-gradient(180deg, var(--ground) 0%, var(--ground-dark) 100%);
  box-shadow: 0 -2px 0 rgba(0,0,0,.15) inset;
}
.ground::before{ content:''; position:absolute; inset:0; opacity:.5;
  background-image: repeating-linear-gradient(100deg, rgba(0,0,0,.05) 0 2px, transparent 2px 40px);
}

.stumps{ position:absolute; left:76%; bottom:16%; width:6vmin; height:9vmin; display:flex; gap:.6vmin; transform-origin:bottom center; }
.stump{ width:1vmin; height:100%; background:linear-gradient(180deg,#efe3cf,#c9b48e); border-radius:2px; transform-origin:bottom center; box-shadow:0 2px 4px rgba(0,0,0,.3); }
.stumps.wobble .stump{ animation: stumpWobble .35s ease-in-out; }
@keyframes stumpWobble{ 0%,100%{transform:rotate(0);} 50%{transform:rotate(4deg);} }
.stumps.fallen .stump:nth-child(1){ transform: rotate(-70deg) translate(-2vmin,1vmin); }
.stumps.fallen .stump:nth-child(2){ transform: rotate(-95deg) translate(-1vmin,2vmin); }
.stumps.fallen .stump:nth-child(3){ transform: rotate(-58deg) translate(-3vmin,0.5vmin); }
.stumps.fallen .stump{ transition: transform .5s cubic-bezier(.4,1.8,.6,1); }

.bowler{ position:absolute; left:12%; bottom:16%; width:9vmin; height:16vmin; cursor:pointer; transform-origin:bottom center; transition: transform .2s ease; }
.bowler svg{ width:100%; height:100%; }
.bowler:hover{ transform: scale(1.04); }
.bowler.running{ animation: bowlerRun .55s ease-in-out; }
@keyframes bowlerRun{
  0%{ transform: translateX(0) translateY(0); }
  25%{ transform: translateX(2.2vmin) translateY(-.6vmin); }
  50%{ transform: translateX(4.4vmin) translateY(0); }
  75%{ transform: translateX(6.4vmin) translateY(-.6vmin); }
  100%{ transform: translateX(8vmin) translateY(0); }
}
.bowler.release{ animation: bowlerRelease .3s ease-out; }
@keyframes bowlerRelease{ 0%{ transform: translateX(8vmin) rotate(0);} 100%{ transform: translateX(8vmin) rotate(-14deg);} }

.batsman{ position:absolute; left:70%; bottom:16%; width:9vmin; height:16vmin; }
.batsman svg{ width:100%; height:100%; overflow:visible; }
.bat{ transform-origin: 30% 85%; transition: transform .12s cubic-bezier(.3,1.6,.5,1); }
.batsman.swing .bat{ transform: rotate(-95deg); }

.ball{
  position:absolute; width:1.6vmin; height:1.6vmin; border-radius:50%;
  background: radial-gradient(circle at 35% 30%, #e4ff8a, #b7d94c 60%, #8fae4f 100%);
  box-shadow: 0 2px 4px rgba(0,0,0,.35);
  left:16%; bottom:30%;
  opacity:0;
  z-index:5;
}
.ball.visible{ opacity:1; }
.ball.hidden-ball{ opacity:0; }

.dust{ position:absolute; width:2.4vmin; height:1vmin; border-radius:50%; background:rgba(200,175,140,.55); pointer-events:none; transform:translate(-50%,-50%) scale(0); }
.dust.pop{ animation: dustPop .5s ease-out forwards; }
@keyframes dustPop{ 0%{ transform:translate(-50%,-50%) scale(.2); opacity:.7;} 100%{ transform:translate(-50%,-50%) scale(2.4); opacity:0;} }

.confetti{ position:absolute; top:-2%; width:1vmin; height:1.4vmin; border-radius:2px; pointer-events:none; z-index:20; }
@keyframes confettiFall{
  0%{ transform: translateY(0) rotate(0deg); opacity:1;}
  100%{ transform: translateY(70vh) rotate(540deg); opacity:0;}
}

.shard{ position:absolute; width:.8vmin; height:.8vmin; background:rgba(200,225,235,.85); pointer-events:none; z-index:20; clip-path: polygon(0 0,100% 20%,60% 100%); }
@keyframes shardFly{
  0%{ transform: translate(0,0) rotate(0deg); opacity:1; }
  100%{ transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); opacity:0; }
}

/* ============================================================
   TITLE SCREEN
   ============================================================ */
#titleScreen{
  position:absolute; inset:0; z-index:60;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; gap:.6em;
  background:transparent;
  transition: opacity .6s ease, visibility .6s;
}
#titleScreen.hidden{ opacity:0; visibility:hidden; pointer-events:none; }
.eyebrow{ color:var(--chalk); opacity:.75; letter-spacing:.14em; text-transform:uppercase; font-size:.78rem; font-weight:500; margin:0 0 .4rem; animation: fadeUp .7s ease both; }
.logo{
  font-family:var(--font-display); font-weight:700; color:var(--chalk);
  font-size: clamp(2.2rem, 8vw, 4.6rem); margin:0; letter-spacing:.01em;
  text-shadow: 0 6px 24px rgba(0,0,0,.35);
  animation: logoIn .7s cubic-bezier(.2,.9,.3,1) both .15s;
}
.logo span{ font-size:.4em; vertical-align: super; opacity:.7; }
@keyframes logoIn{ from{ filter:blur(8px); transform: scale(1.2); opacity:0;} to{ filter:blur(0); transform: scale(1); opacity:1;} }
.chalk-underline{ width:min(280px,50vw); height:6px; margin:0 auto; position:relative; }
.chalk-underline svg{ width:100%; height:100%; }
.chalk-underline path{ stroke-dasharray: 300; stroke-dashoffset:300; animation: draw 1s ease .55s forwards; }
@keyframes draw{ to{ stroke-dashoffset:0; } }
.tagline{ font-family:var(--font-chalk); color:var(--chalk); font-size: clamp(1rem,2.4vw,1.4rem); opacity:0; animation: fadeUp .7s ease both .9s; }
@keyframes fadeUp{ from{ opacity:0; transform: translateY(14px);} to{ opacity:1; transform:translateY(0);} }

.play-btn{
  margin-top:1.4rem; padding: .9em 2.4em; font-family:var(--font-display); font-weight:600; font-size:1.05rem;
  color:var(--ui-charcoal); background: linear-gradient(180deg, #fff6e4, var(--chalk));
  border:none; border-radius:999px; cursor:pointer;
  box-shadow: 0 10px 26px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.4) inset;
  opacity:0; animation: fadeUp .7s ease both 1.2s, pulse 2.4s ease-in-out infinite 2s;
  transition: transform .15s cubic-bezier(.3,1.6,.5,1), box-shadow .2s;
}
.play-btn:hover{ box-shadow: 0 14px 30px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.5) inset; }
.play-btn:active{ transform: scale(.94); }
@keyframes pulse{ 0%,100%{ transform: scale(1);} 50%{ transform: scale(1.035);} }
.play-btn.small{ margin-top:1rem; padding:.7em 1.8em; font-size:.92rem; }

/* ============================================================
   HUD
   ============================================================ */
.hud{
  position:absolute; top:0; left:0; right:0; z-index:40;
  display:flex; justify-content:space-between; align-items:flex-start;
  padding: max(16px, env(safe-area-inset-top)) 18px 0;
  transition: opacity .4s ease;
}
.hud.hidden{ opacity:0; pointer-events:none; }
.score-board{
  background: var(--ui-glass); backdrop-filter: blur(10px);
  border:1px solid var(--ui-glass-border); border-radius:18px;
  padding:.5em 1em; display:flex; align-items:baseline; gap:.5em;
  box-shadow: 0 8px 22px rgba(0,0,0,.25);
}
.score-label{ font-size:.62rem; letter-spacing:.14em; color:var(--chalk-dim); text-transform:uppercase; }
.score-value{ font-family:var(--font-chalk); font-size:1.7rem; color:var(--chalk); font-weight:700; transition: transform .2s; }
.score-value.bump{ animation: scoreBump .35s ease; }
@keyframes scoreBump{ 0%{transform:scale(1);} 40%{transform:scale(1.35);} 100%{transform:scale(1);} }

.pebbles{ display:flex; gap:.5em; background: var(--ui-glass); backdrop-filter: blur(10px);
  border:1px solid var(--ui-glass-border); border-radius:18px; padding:.6em .8em; box-shadow: 0 8px 22px rgba(0,0,0,.25); }
.pebble{ width:.85em; height:.85em; border-radius:50%; background: radial-gradient(circle at 35% 30%, #fff3d6, var(--accent-mango)); box-shadow: 0 2px 4px rgba(0,0,0,.3); transition: all .35s cubic-bezier(.3,1,.4,1); }
.pebble.used{ transform: scale(0) translateY(6px); opacity:0; background:var(--chalk-dim); }

.prompt{
  position:absolute; left:50%; bottom:8%; transform:translateX(-50%);
  font-family:var(--font-chalk); font-size:1.2rem; color:var(--chalk);
  background: rgba(24,18,15,.35); backdrop-filter: blur(6px);
  padding:.35em 1em; border-radius:999px; letter-spacing:.03em;
  z-index:35; animation: promptPulse 1.4s ease-in-out infinite;
  transition: opacity .3s;
}
.prompt.hidden{ opacity:0; pointer-events:none; }
@keyframes promptPulse{ 0%,100%{ opacity:.55;} 50%{ opacity:1;} }

.outcome-text{
  position:absolute; left:50%; top:38%; transform:translate(-50%,-50%) scale(.5);
  font-family:var(--font-display); font-weight:700; letter-spacing:.02em;
  font-size: clamp(1.8rem,7vw,4rem); color:var(--chalk); opacity:0; z-index:55;
  text-shadow: 0 8px 30px rgba(0,0,0,.4);
  pointer-events:none;
  text-align:center;
}
.outcome-text.show{ animation: outcomePop .9s cubic-bezier(.2,1.4,.3,1) forwards; }
@keyframes outcomePop{
  0%{ opacity:0; transform:translate(-50%,-50%) scale(.4) rotate(-4deg); }
  18%{ opacity:1; transform:translate(-50%,-50%) scale(1.12) rotate(2deg); }
  30%{ transform:translate(-50%,-50%) scale(1) rotate(0deg); }
  78%{ opacity:1; transform:translate(-50%,-50%) scale(1) rotate(0deg); }
  100%{ opacity:0; transform:translate(-50%,-60%) scale(.92) rotate(0deg); }
}
.outcome-text.six{ color:var(--accent-mango); }
.outcome-text.four{ color:var(--turquoise); }
.outcome-text.out{ color:var(--accent-rose); }

#app.shake{ animation: screenShake .4s cubic-bezier(.36,.07,.19,.97); }
@keyframes screenShake{
  10%,90%{ transform: translate3d(-1px,0,0); }
  20%,80%{ transform: translate3d(2px,0,0); }
  30%,50%,70%{ transform: translate3d(-3px,1px,0); }
  40%,60%{ transform: translate3d(3px,-1px,0); }
}

/* ============================================================
   RESULT CARD
   ============================================================ */
#resultCard{
  position:absolute; inset:0; z-index:70; display:flex; align-items:center; justify-content:center;
  background: rgba(15,10,8,.55); backdrop-filter: blur(6px);
  transition: opacity .4s ease, visibility .4s;
}
#resultCard.hidden{ opacity:0; visibility:hidden; pointer-events:none; }
.polaroid{
  background: var(--chalk); border-radius:14px; padding:1.1em 1.1em 1.4em; width:min(320px,78vw);
  box-shadow: 0 30px 60px rgba(0,0,0,.5);
  transform: rotate(-1.5deg) translateY(30px) scale(.9); opacity:0;
  text-align:center;
}
#resultCard:not(.hidden) .polaroid{ animation: polaroidIn .55s cubic-bezier(.2,1.3,.3,1) forwards .1s; }
@keyframes polaroidIn{ to{ transform: rotate(-1.5deg) translateY(0) scale(1); opacity:1; } }
.polaroid-photo{
  background: linear-gradient(160deg,#ffcf8f,#e8637a 60%,#7b4b8a);
  border-radius:6px; height:150px; display:flex; align-items:center; justify-content:center; font-size:3.4rem;
  margin-bottom:.8em;
}
.polaroid-caption{ font-family:var(--font-chalk); font-size:1.1rem; color:var(--ui-charcoal); margin:.2em 0; }
.polaroid-score{ font-family:var(--font-display); font-weight:700; font-size:1.6rem; color:var(--ui-charcoal-soft); margin:.2em 0 .1em; }
.polaroid-sub{ font-family:var(--font-display); font-size:.78rem; color:#8a7a68; margin:0 0 .3em; }

/* pause / mute */
#muteBtn{
  position:absolute; top:max(16px, env(safe-area-inset-top)); right:18px; z-index:41;
  width:38px; height:38px; border-radius:50%; border:1px solid var(--ui-glass-border);
  background:var(--ui-glass); backdrop-filter: blur(10px); color:var(--chalk); font-size:1rem;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  transition: transform .15s cubic-bezier(.3,1.6,.5,1);
}
#muteBtn:active{ transform: scale(.88); }
#muteBtn.hidden{ display:none; }

@media (max-width: 640px){
  .stumps{ left:74%; }
  .batsman{ left:66%; }
  .scooter{ left:86%; }
}
@media (prefers-reduced-motion: reduce){
  *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; }
}
</style>
</head>
<body>
<div id="app">

  <div id="scene">
    <div class="layer" id="sky">
      <div class="sun"></div>
    </div>

    <div class="layer">
      <div class="kite" id="kite">
        <svg viewBox="0 0 40 48"><polygon points="20,0 40,20 20,48 0,20" fill="#e8637a" stroke="#fff3d6" stroke-width="2"/></svg>
      </div>
      <div class="crow" id="crow">
        <svg viewBox="0 0 24 24"><path d="M2 14 Q8 8 12 14 Q16 8 22 14 Q16 12 12 16 Q8 12 2 14Z" fill="#241b16"/></svg>
      </div>
    </div>

    <div class="layer" id="rooftops">
      <div class="building b1"></div>
      <div class="building b2">
        <div class="window uncle-window" id="uncleWindow">
          <div class="curtain"></div>
          <div class="uncle-silhouette"></div>
        </div>
      </div>
      <div class="building b3"></div>
      <div class="clothesline" id="clothesline"><span></span><span></span><span></span></div>
    </div>

    <div class="layer" id="midground">
      <div class="pigeon" id="pigeon">
        <svg viewBox="0 0 30 26"><ellipse cx="14" cy="16" rx="11" ry="8" fill="#c9c2b0"/><circle cx="24" cy="8" r="5" fill="#c9c2b0"/><circle cx="26.5" cy="6.5" r="1.1" fill="#241b16"/><path d="M29 8 L34 6 L29 10Z" fill="#ffb238"/></svg>
      </div>
      <div class="dog" id="dog">
        <svg viewBox="0 0 60 36">
          <ellipse cx="26" cy="22" rx="18" ry="11" fill="#d99a4e"/>
          <circle cx="46" cy="14" r="9" fill="#d99a4e"/>
          <circle cx="50" cy="10" r="1.4" fill="#241b16"/>
          <path d="M40 8 L36 2 L38 10Z" fill="#c1613f"/>
          <g class="tail"><path d="M8 18 Q0 10 4 4" stroke="#c1613f" stroke-width="5" fill="none" stroke-linecap="round"/></g>
        </svg>
      </div>
      <div class="scooter" id="scooter">
        <svg viewBox="0 0 80 60">
          <circle cx="14" cy="50" r="9" fill="#241b16"/><circle cx="66" cy="50" r="9" fill="#241b16"/>
          <path d="M14 50 L30 50 L38 22 L58 22 L66 50" stroke="#4fb3a9" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="52" y="8" width="6" height="18" rx="3" fill="#357b74"/>
          <rect x="20" y="34" width="22" height="8" rx="4" fill="#357b74"/>
        </svg>
      </div>
    </div>

    <div class="layer" id="street">
      <div class="ground"></div>

      <div class="stumps" id="stumps">
        <div class="stump"></div><div class="stump"></div><div class="stump"></div>
      </div>

      <div class="bowler" id="bowler">
        <svg viewBox="0 0 60 100">
          <ellipse cx="30" cy="96" rx="16" ry="4" fill="rgba(0,0,0,.25)"/>
          <rect x="18" y="34" width="24" height="42" rx="10" fill="#357b74"/>
          <circle cx="30" cy="20" r="13" fill="#d99a4e"/>
          <rect x="10" y="70" width="12" height="26" rx="5" fill="#241b16"/>
          <rect x="38" y="70" width="12" height="26" rx="5" fill="#241b16"/>
          <rect x="4" y="38" width="30" height="9" rx="4.5" fill="#357b74"/>
        </svg>
      </div>

      <div class="batsman" id="batsman">
        <svg viewBox="0 0 60 100">
          <ellipse cx="30" cy="96" rx="16" ry="4" fill="rgba(0,0,0,.25)"/>
          <rect x="18" y="34" width="24" height="42" rx="10" fill="#e8637a"/>
          <circle cx="30" cy="20" r="13" fill="#c1613f"/>
          <rect x="10" y="70" width="12" height="26" rx="5" fill="#241b16"/>
          <rect x="38" y="70" width="12" height="26" rx="5" fill="#241b16"/>
          <g class="bat">
            <rect x="34" y="36" width="8" height="34" rx="3" fill="#f4efe2"/>
            <rect x="35" y="66" width="6" height="10" rx="2" fill="#c9b48e"/>
          </g>
        </svg>
      </div>

      <div class="ball" id="ball"></div>
    </div>
  </div>

  <button id="muteBtn" class="hidden" title="Mute sound">🔊</button>

  <div id="titleScreen" class="title-screen">
    <p class="eyebrow">Playrium presents</p>
    <h1 class="logo">GULLY CRICKET<span>™</span></h1>
    <div class="chalk-underline">
      <svg viewBox="0 0 280 6" preserveAspectRatio="none"><path d="M2 3 Q70 0 140 3 T278 3" stroke="#f4efe2" stroke-width="3" fill="none" stroke-linecap="round"/></svg>
    </div>
    <p class="tagline">Every Street Has A Legend.</p>
    <button id="playBtn" class="play-btn">Play</button>
  </div>

  <div class="hud hidden" id="hud">
    <div class="score-board">
      <span class="score-label">Score</span>
      <span class="score-value" id="scoreValue">0</span>
    </div>
    <div class="pebbles" id="pebbles"></div>
  </div>

  <div class="prompt hidden" id="prompt">Tap anywhere to swing</div>
  <div class="outcome-text" id="outcomeText"></div>

  <div id="resultCard" class="hidden">
    <div class="polaroid">
      <div class="polaroid-photo" id="resultEmoji">🏏</div>
      <p class="polaroid-sub" id="resultSub">OVER COMPLETE</p>
      <p class="polaroid-score" id="resultScore">0 runs</p>
      <p class="polaroid-caption" id="resultCaption">Gully Legend</p>
      <button id="replayBtn" class="play-btn small">Bowl Again</button>
    </div>
  </div>

</div>

<script>
(function(){
"use strict";

/* ============================================================
   DOM REFS
   ============================================================ */
const app = document.getElementById('app');
const scene = document.getElementById('scene');
const titleScreen = document.getElementById('titleScreen');
const playBtn = document.getElementById('playBtn');
const hud = document.getElementById('hud');
const scoreValue = document.getElementById('scoreValue');
const pebblesEl = document.getElementById('pebbles');
const promptEl = document.getElementById('prompt');
const outcomeText = document.getElementById('outcomeText');
const resultCard = document.getElementById('resultCard');
const resultScore = document.getElementById('resultScore');
const resultCaption = document.getElementById('resultCaption');
const resultEmoji = document.getElementById('resultEmoji');
const replayBtn = document.getElementById('replayBtn');
const muteBtn = document.getElementById('muteBtn');

const ball = document.getElementById('ball');
const bowler = document.getElementById('bowler');
const batsman = document.getElementById('batsman');
const stumps = document.getElementById('stumps');
const scooter = document.getElementById('scooter');
const dog = document.getElementById('dog');
const pigeon = document.getElementById('pigeon');
const kite = document.getElementById('kite');
const crow = document.getElementById('crow');
const clothesline = document.getElementById('clothesline');
const uncleWindow = document.getElementById('uncleWindow');

/* ============================================================
   AUDIO — synthesized, no external files
   ============================================================ */
let actx = null;
let muted = false;
function ac(){ if(!actx){ actx = new (window.AudioContext||window.webkitAudioContext)(); } return actx; }

function envGain(ctx, dur, peak){
  const g = ctx.createGain();
  g.gain.setValueAtTime(0, ctx.currentTime);
  g.gain.linearRampToValueAtTime(peak, ctx.currentTime + 0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
  return g;
}

function tone(freq, dur, type, peak){
  if(muted) return;
  const ctx = ac();
  const osc = ctx.createOscillator();
  osc.type = type || 'triangle';
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  const g = envGain(ctx, dur, peak||0.25);
  osc.connect(g).connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + dur + 0.05);
}

function noiseBurst(dur, filterFreq, type, peak){
  if(muted) return;
  const ctx = ac();
  const bufferSize = Math.floor(ctx.sampleRate * dur);
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++){ data[i] = (Math.random()*2-1) * (1 - i/bufferSize); }
  const src = ctx.createBufferSource();
  src.buffer = buffer;
  const filt = ctx.createBiquadFilter();
  filt.type = type || 'bandpass';
  filt.frequency.value = filterFreq || 1200;
  const g = envGain(ctx, dur, peak||0.3);
  src.connect(filt).connect(g).connect(ctx.destination);
  src.start();
}

const Sound = {
  tokPerfect(){ tone(920,0.14,'triangle',0.35); setTimeout(()=>tone(1400,0.08,'sine',0.15),20); },
  tokGood(){ tone(640,0.13,'triangle',0.3); },
  tokOk(){ tone(420,0.12,'sine',0.22); },
  thud(){ tone(160,0.16,'sine',0.22); },
  whoosh(){ noiseBurst(0.28,1800,'bandpass',0.18); },
  crowd(){ noiseBurst(0.7,900,'bandpass',0.28); setTimeout(()=>noiseBurst(0.5,1400,'bandpass',0.16),120); },
  glass(){ noiseBurst(0.3,3200,'highpass',0.28); setTimeout(()=>noiseBurst(0.18,4200,'highpass',0.18),40); },
  clatter(){ tone(200,0.1,'square',0.15); setTimeout(()=>tone(160,0.12,'square',0.13),60); setTimeout(()=>tone(120,0.14,'square',0.11),120); },
  horn(){ tone(320,0.12,'square',0.18); setTimeout(()=>tone(320,0.12,'square',0.18),140); },
  bark(){ const ctx=ac(); if(muted)return; const osc=ctx.createOscillator(); osc.type='sawtooth'; osc.frequency.setValueAtTime(300,ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(140,ctx.currentTime+0.16); const g=envGain(ctx,0.18,0.18); osc.connect(g).connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime+0.2); },
  pop(){ tone(1100,0.06,'sine',0.14); },
  click(){ tone(700,0.05,'sine',0.1); },
};

muteBtn.classList.remove('hidden');
muteBtn.addEventListener('click', ()=>{
  muted = !muted;
  muteBtn.textContent = muted ? '🔇' : '🔊';
  Sound.click();
});

/* ============================================================
   PARALLAX
   ============================================================ */
const parallaxLayers = [
  {el: document.getElementById('sky'), depth: 6},
  {el: bowler.closest('.layer'), depth: 10}, // street layer (shared)
];
// Simpler: apply parallax to a curated set with individual depth
const px = [
  {el: kite.parentElement, depth: 14},
  {el: document.getElementById('rooftops'), depth: 8},
  {el: document.getElementById('midground'), depth: 5},
];
let targetX = 0, targetY = 0, curX = 0, curY = 0;
function onPointerMove(x, y){
  const nx = (x / window.innerWidth - 0.5) * 2;
  const ny = (y / window.innerHeight - 0.5) * 2;
  targetX = nx; targetY = ny;
}
window.addEventListener('mousemove', e => onPointerMove(e.clientX, e.clientY));
window.addEventListener('touchmove', e => { if(e.touches[0]) onPointerMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive:true});

function parallaxTick(){
  curX += (targetX - curX) * 0.06;
  curY += (targetY - curY) * 0.06;
  px.forEach(l => { l.el.style.transform = `translate(${curX*l.depth}px, ${curY*l.depth*0.6}px)`; });
  requestAnimationFrame(parallaxTick);
}
requestAnimationFrame(parallaxTick);

/* ============================================================
   DELIGHT INTERACTIONS
   ============================================================ */
function stop(e){ e.stopPropagation(); }

kite.addEventListener('click', e=>{ stop(e); kite.classList.remove('dip'); void kite.offsetWidth; kite.classList.add('dip'); Sound.whoosh(); });

crow.addEventListener('click', e=>{ stop(e); if(crow.classList.contains('fly')) return; crow.classList.add('fly'); Sound.pop();
  setTimeout(()=>{ crow.classList.remove('fly'); crow.style.transform=''; }, 1300); });

pigeon.addEventListener('click', e=>{ stop(e);
  Sound.pop();
  pigeon.classList.add('fly');
  const newLeft = 18 + Math.random()*20;
  pigeon.style.left = newLeft + '%';
  setTimeout(()=> pigeon.classList.remove('fly'), 720);
});
setInterval(()=>{ if(Math.random()<0.5) pigeon.classList.add('peck'); setTimeout(()=>pigeon.classList.remove('peck'),500); }, 3400);

dog.addEventListener('click', e=>{ stop(e); dog.classList.remove('wag'); void dog.offsetWidth; dog.classList.add('wag'); Sound.bark(); });

scooter.addEventListener('click', e=>{ stop(e); scooter.classList.remove('wobble'); void scooter.offsetWidth; scooter.classList.add('wobble'); Sound.horn(); });

clothesline.addEventListener('click', e=>{ stop(e); clothesline.classList.add('tug'); Sound.click(); setTimeout(()=>clothesline.classList.remove('tug'),1200); });

uncleWindow.addEventListener('click', e=>{ stop(e); if(!uncleWindow.classList.contains('angry')){ uncleWindow.classList.add('curtain-twitch'); Sound.click(); } });

bowler.addEventListener('click', e=>{ stop(e); if(state===STATE.TITLE || state===STATE.OVER) return; Sound.pop(); });

/* ============================================================
   PARTICLES
   ============================================================ */
function spawnDust(xPercent, yPercentFromBottom){
  const d = document.createElement('div');
  d.className = 'dust pop';
  d.style.left = xPercent + '%';
  d.style.bottom = yPercentFromBottom + '%';
  document.getElementById('street').appendChild(d);
  setTimeout(()=>d.remove(), 520);
}

const leafColors = ['#ffb238','#e8637a','#4fb3a9','#f4efe2','#8fae4f'];
function spawnConfetti(count){
  for(let i=0;i<count;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = (30 + Math.random()*40) + '%';
    c.style.top = (10 + Math.random()*15) + '%';
    c.style.background = leafColors[i % leafColors.length];
    c.style.animation = `confettiFall ${1.1 + Math.random()*0.8}s ease-in forwards`;
    c.style.animationDelay = (Math.random()*0.3) + 's';
    scene.appendChild(c);
    setTimeout(()=>c.remove(), 2200);
  }
}

function spawnShards(xPercent, yPercentTop, count){
  for(let i=0;i<count;i++){
    const s = document.createElement('div');
    s.className = 'shard';
    s.style.left = xPercent + '%';
    s.style.top = yPercentTop + '%';
    const dx = (Math.random()*2-1) * 60 + 'px';
    const dy = (Math.random()*40 + 20) + 'px';
    const rot = (Math.random()*360) + 'deg';
    s.style.setProperty('--dx', dx);
    s.style.setProperty('--dy', dy);
    s.style.setProperty('--rot', rot);
    s.style.animation = 'shardFly 0.6s ease-in forwards';
    scene.appendChild(s);
    setTimeout(()=>s.remove(), 650);
  }
}

/* ============================================================
   GAME STATE MACHINE
   ============================================================ */
const STATE = { TITLE:'title', RUNUP:'runup', DELIVERY:'delivery', RESOLVE:'resolve', OVER:'over' };
let state = STATE.TITLE;

let score = 0;
let ballsBowled = 0;
const TOTAL_BALLS = 6;
let swingRegistered = false;
let swingTime = 0;
let idealContactTime = 0;
let ballRAF = null;
let deliveryStart = 0;
let deliveryDuration = 0;
let firstBall = true;

const BOWLER_HAND = {x:16, y:34};
const BOUNCE_PT   = {x:44, y:17};
const CONTACT_PT  = {x:69, y:29};

function buildPebbles(){
  pebblesEl.innerHTML = '';
  for(let i=0;i<TOTAL_BALLS;i++){
    const p = document.createElement('div');
    p.className = 'pebble';
    pebblesEl.appendChild(p);
  }
}

function consumePebble(){
  const remaining = pebblesEl.querySelectorAll('.pebble:not(.used)');
  if(remaining[0]) remaining[0].classList.add('used');
}

function setBallPos(xPct, yPct){
  ball.style.left = xPct + '%';
  ball.style.bottom = yPct + '%';
}

function lerp(a,b,t){ return a + (b-a)*t; }

function startGame(){
  score = 0; ballsBowled = 0; firstBall = true;
  scoreValue.textContent = '0';
  buildPebbles();
  titleScreen.classList.add('hidden');
  hud.classList.remove('hidden');
  resultCard.classList.add('hidden');
  stumps.classList.remove('fallen');
  setTimeout(startBall, 500);
}

function startBall(){
  if(ballsBowled >= TOTAL_BALLS){ showOverSummary(); return; }
  state = STATE.RUNUP;
  swingRegistered = false;
  outcomeText.className = 'outcome-text';
  scene.classList.remove('zoom-six','zoom-catch');
  bowler.style.transform = '';
  bowler.classList.remove('running','release');
  batsman.classList.remove('swing');
  setBallPos(BOWLER_HAND.x, BOWLER_HAND.y);
  ball.classList.remove('visible');

  if(firstBall){ promptEl.classList.remove('hidden'); }

  // run-up
  bowler.classList.add('running');
  setTimeout(()=>{
    bowler.classList.remove('running');
    bowler.classList.add('release');
    releaseBall();
  }, 560);
}

function releaseBall(){
  state = STATE.DELIVERY;
  Sound.whoosh();
  scene.classList.add('zoom-in');
  ball.classList.add('visible');
  deliveryDuration = 780 + Math.random()*220; // ms
  deliveryStart = performance.now();
  idealContactTime = deliveryStart + deliveryDuration;

  function frame(now){
    const t = Math.min(1, (now - deliveryStart) / deliveryDuration);
    let x, y;
    if(t < 0.5){
      const u = t/0.5;
      x = lerp(BOWLER_HAND.x, BOUNCE_PT.x, u);
      y = lerp(BOWLER_HAND.y, BOUNCE_PT.y, u) + Math.sin(u*Math.PI) * 6;
    } else {
      const u = (t-0.5)/0.5;
      x = lerp(BOUNCE_PT.x, CONTACT_PT.x, u);
      y = lerp(BOUNCE_PT.y, CONTACT_PT.y, u) + Math.sin(u*Math.PI) * 9;
    }
    setBallPos(x, y);
    if(t >= 0.5 && t < 0.52){ spawnDust(BOUNCE_PT.x, BOUNCE_PT.y-2); }

    if(t < 1 && state === STATE.DELIVERY){
      ballRAF = requestAnimationFrame(frame);
    } else if(state === STATE.DELIVERY){
      // no swing registered in time
      resolveOutcome(null);
    }
  }
  ballRAF = requestAnimationFrame(frame);

  // timeout safety
  clearTimeout(window.__deliveryTimeout);
  window.__deliveryTimeout = setTimeout(()=>{
    if(state === STATE.DELIVERY && !swingRegistered){ resolveOutcome(null); }
  }, deliveryDuration + 260);
}

function registerSwing(){
  if(state !== STATE.DELIVERY || swingRegistered) return;
  swingRegistered = true;
  swingTime = performance.now();
  batsman.classList.add('swing');
  setTimeout(()=> batsman.classList.remove('swing'), 260);
  const diff = swingTime - idealContactTime;
  resolveOutcome(diff);
}

function resolveOutcome(diff){
  if(state !== STATE.DELIVERY) return;
  state = STATE.RESOLVE;
  cancelAnimationFrame(ballRAF);
  clearTimeout(window.__deliveryTimeout);
  promptEl.classList.add('hidden');
  scene.classList.remove('zoom-in');

  let type;
  if(diff === null){
    type = 'BOWLED';
  } else {
    const abs = Math.abs(diff);
    if(abs <= 45) type = (diff < -15 && Math.random() < 0.5) ? 'SIX_WINDOW' : 'SIX';
    else if(abs <= 95) type = 'FOUR';
    else if(abs <= 155) type = 'SINGLE';
    else if(abs <= 230) type = 'DOT';
    else type = 'CAUGHT';
  }

  playOutcome(type);
}

function popText(msg, cls){
  outcomeText.textContent = msg;
  outcomeText.className = 'outcome-text ' + (cls||'');
  void outcomeText.offsetWidth;
  outcomeText.classList.add('show');
}

function bumpScore(runs){
  score += runs;
  scoreValue.textContent = score;
  scoreValue.classList.remove('bump'); void scoreValue.offsetWidth; scoreValue.classList.add('bump');
}

function endBallAfter(ms){
  setTimeout(()=>{
    ballsBowled++;
    consumePebble();
    firstBall = false;
    ball.classList.remove('visible');
    if(ballsBowled >= TOTAL_BALLS){ showOverSummary(); }
    else { startBall(); }
  }, ms);
}

function animateBallTo(xPct, yPct, ms, cb){
  const startX = parseFloat(ball.style.left);
  const startY = parseFloat(ball.style.bottom);
  const t0 = performance.now();
  function step(now){
    const t = Math.min(1, (now-t0)/ms);
    const ease = 1 - Math.pow(1-t, 2);
    setBallPos(lerp(startX,xPct,ease), lerp(startY,yPct,ease));
    ball.style.opacity = 1 - Math.pow(t,3)*0.9;
    if(t<1) requestAnimationFrame(step); else if(cb) cb();
  }
  requestAnimationFrame(step);
}

function playOutcome(type){
  switch(type){
    case 'SIX': {
      Sound.tokPerfect();
      bumpScore(6);
      scene.classList.add('zoom-six');
      popText('SIX! 🚀', 'six');
      spawnConfetti(16);
      animateBallTo(CONTACT_PT.x + 14, 92, 650, ()=>{ ball.style.opacity=1; });
      setTimeout(Sound.crowd, 120);
      endBallAfter(1300);
      break;
    }
    case 'SIX_WINDOW': {
      Sound.tokPerfect();
      bumpScore(6);
      scene.classList.add('zoom-six');
      popText("SIX! Over Sharma Uncle's wall! 😤", 'six');
      spawnConfetti(12);
      animateBallTo(58, 76, 420, ()=>{
        Sound.glass();
        spawnShards(58, 24, 7);
        uncleWindow.classList.add('angry');
        app.classList.remove('shake'); void app.offsetWidth; app.classList.add('shake');
        ball.style.opacity = 1;
        setTimeout(()=> uncleWindow.classList.remove('angry'), 1600);
      });
      setTimeout(Sound.crowd, 500);
      endBallAfter(1500);
      break;
    }
    case 'FOUR': {
      Sound.tokGood();
      bumpScore(4);
      popText('FOUR!', 'four');
      animateBallTo(90, 13, 520, ()=>{
        Sound.horn();
        scooter.classList.remove('wobble'); void scooter.offsetWidth; scooter.classList.add('wobble');
        ball.style.opacity = 1;
      });
      endBallAfter(1150);
      break;
    }
    case 'SINGLE': {
      Sound.tokOk();
      bumpScore(1);
      popText('Quick single!', '');
      animateBallTo(80, 20, 380, ()=>{ ball.style.opacity=1; spawnDust(80,19); });
      endBallAfter(950);
      break;
    }
    case 'DOT': {
      Sound.thud();
      popText('Defended.', '');
      animateBallTo(72, 24, 260, ()=>{ ball.style.opacity=1; });
      endBallAfter(850);
      break;
    }
    case 'CAUGHT': {
      Sound.thud();
      popText('CAUGHT! Out!', 'out');
      scene.classList.add('zoom-catch');
      app.classList.remove('shake'); void app.offsetWidth; app.classList.add('shake');
      animateBallTo(75, 55, 300, ()=>{ ball.style.opacity=1; });
      setTimeout(()=> scene.classList.remove('zoom-catch'), 400);
      endBallAfter(1150);
      break;
    }
    case 'BOWLED':
    default: {
      Sound.clatter();
      popText('BOWLED! Arre yaar 😅', 'out');
      stumps.classList.add('wobble');
      setTimeout(()=>{ stumps.classList.remove('wobble'); stumps.classList.add('fallen'); }, 200);
      app.classList.remove('shake'); void app.offsetWidth; app.classList.add('shake');
      animateBallTo(78, 17, 220, ()=>{ ball.style.opacity=1; });
      setTimeout(()=> stumps.classList.remove('fallen'), 1300);
      endBallAfter(1300);
      break;
    }
  }
}

function showOverSummary(){
  state = STATE.OVER;
  let caption, emoji;
  if(score >= 30){ caption = 'GULLY LEGEND! 🏆'; emoji='🏆'; }
  else if(score >= 18){ caption = 'Street Star ⭐'; emoji='⭐'; }
  else if(score >= 8){ caption = 'Decent knock 👍'; emoji='🏏'; }
  else { caption = 'Better luck next over'; emoji='😅'; }
  resultScore.textContent = score + ' runs';
  resultCaption.textContent = caption;
  resultEmoji.textContent = emoji;
  resultCard.classList.remove('hidden');
}

/* ============================================================
   INPUT
   ============================================================ */
app.addEventListener('pointerdown', (e)=>{
  if(state === STATE.DELIVERY){ registerSwing(); }
});
window.addEventListener('keydown', (e)=>{
  if(e.code === 'Space'){
    e.preventDefault();
    if(state === STATE.DELIVERY){ registerSwing(); }
  }
});

playBtn.addEventListener('click', ()=>{ ac(); Sound.click(); startGame(); });
replayBtn.addEventListener('click', ()=>{ Sound.click(); startGame(); });

})();
</script>
</body>
</html>
