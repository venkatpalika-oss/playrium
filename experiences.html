<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Explore All Experiences — Playrium</title>
<meta name="description" content="Browse the complete Playrium catalogue — every handcrafted interactive experience from every country and collection, searchable and filterable in one place.">

<meta property="og:title" content="Explore All Experiences — Playrium">
<meta property="og:description" content="Search, filter, and discover every Playrium experience — Originals, India, Japan, Philippines, and Relax & Satisfy picks.">

<meta property="og:url" content="https://www.playrium.fun/experiences.html">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
--bg-deep:#05050a; --bg-mid:#12121c;
--chalk:#f4f0e6; --chalk-dim:#9a97a8;
--ui-glass:rgba(244,240,230,.07); --ui-glass-border:rgba(244,240,230,.14);
--ui-glass-strong:rgba(20,20,28,.55);
--font-display:'Fredoka', system-ui, sans-serif; --font-chalk:'Kalam', cursive;
}
*{box-sizing:border-box;}
html,body{ margin:0; padding:0; width:100%; min-height:100%; background:var(--bg-deep);
font-family:var(--font-display); -webkit-tap-highlight-color:transparent; }
body{ color:var(--chalk); }
a{ -webkit-tap-highlight-color:transparent; }
:focus-visible{ outline:2px solid #b4fff0; outline-offset:2px; }
.page-head{ max-width:900px; margin:0 auto; padding:3.4rem 1.5rem 1.2rem; text-align:center; }
.page-eyebrow{ color:var(--chalk); opacity:.7; letter-spacing:.3em; text-transform:uppercase; font-size:.75rem; font-weight:500; margin:0 0 .6rem; }
.page-title{ font-weight:700; font-size:clamp(1.6rem,3.2vw,2.4rem); margin:0; letter-spacing:-.01em; }
.page-sub{ font-family:var(--font-chalk); color:var(--chalk-dim); font-size:1.02rem; margin:.7rem auto 0; max-width:560px; }
.search-wrap{ max-width:640px; margin:0 auto; padding:0 1.5rem 1rem; }
.search-input{ width:100%; font-family:var(--font-display); font-size:1.05rem; padding:1rem 1.3rem; border-radius:1rem;
border:1px solid var(--ui-glass-border); background:var(--ui-glass); color:var(--chalk); outline:none; box-sizing:border-box; }
.search-input::placeholder{ color:var(--chalk-dim); }
.chips-wrap{ max-width:1100px; margin:0 auto; padding:0 1.5rem 1rem; overflow-x:auto; }
.chips{ display:flex; gap:.6rem; flex-wrap:wrap; }
.chip{ font-family:var(--font-display); font-weight:600; font-size:.82rem; padding:.5rem 1.1rem; border-radius:999px;
border:1px solid var(--ui-glass-border); background:var(--ui-glass); color:var(--chalk-dim); cursor:pointer; white-space:nowrap; transition:all .2s ease; }
.chip:hover{ color:var(--chalk); }
.chip.active{ background:var(--chalk); color:var(--bg-deep); border-color:var(--chalk); }
.group{ max-width:1200px; margin:0 auto; padding:1.6rem 1.5rem; }
.group.featured-group{ background:linear-gradient(135deg, rgba(240,193,75,.08), rgba(180,255,240,.05)); border-radius:1.6rem; }
.group-title{ font-weight:600; font-size:1.15rem; margin:0 0 1.1rem; display:flex; align-items:center; gap:.5rem; }
.group-count{ color:var(--chalk-dim); font-weight:500; font-size:.85rem; }
.grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:1.1rem; }
.exp-card{ position:relative; display:block; border-radius:1.2rem; overflow:hidden; text-decoration:none;
aspect-ratio:4/3; background:#14141e; border:1px solid var(--ui-glass-border); box-shadow:0 14px 30px rgba(0,0,0,.35);
transition:transform .25s ease, border-color .25s ease; }
.exp-card:hover{ transform:translateY(-4px); border-color:rgba(244,240,230,.35); }
.exp-card-icon{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:2.6rem; }
.exp-card-content{ position:absolute; left:0; right:0; bottom:0; padding:.9rem 1rem; background:linear-gradient(180deg,transparent,rgba(5,5,10,.92) 70%); }
.exp-card-title{ color:var(--chalk); font-weight:600; font-size:.92rem; margin:0; }
.exp-card-tag{ font-family:var(--font-chalk); color:var(--chalk-dim); font-size:.76rem; margin:.15rem 0 0; }
.exp-card.is-hidden{ display:none; }
.group.is-hidden{ display:none; }
.empty-state{ text-align:center; color:var(--chalk-dim); font-family:var(--font-chalk); padding:2.5rem 1.5rem; }
.pr-breadcrumb-fallback{ max-width:1200px; margin:0 auto; padding:1.2rem 1.5rem 0; color:var(--chalk-dim); font-size:.85rem; }
.pr-breadcrumb-fallback a{ color:var(--chalk-dim); text-decoration:none; }
.pr-breadcrumb-fallback a:hover{ color:var(--chalk); }
@media (max-width:640px){ .grid{ grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); } }
</style>
</head>
<body>
<header id="site-header"></header>
<nav class="pr-breadcrumb-fallback" aria-label="Breadcrumb"><a href="index.html">Playrium</a> &rsaquo; Explore</nav>

<section class="page-head">
<p class="page-eyebrow">Playrium</p>
<h1 class="page-title">Explore All Experiences</h1>
<p class="page-sub">Search, filter, and find your next favorite — every experience, in one place.</p>
</section>

<section class="search-wrap">
<label class="sr-only" for="expSearchInput" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);">Search experiences</label>
<input id="expSearchInput" type="search" class="search-input" placeholder="Search by title, country, tag, or mood…" autocomplete="off">
</section>

<section class="chips-wrap" aria-label="Filter the full catalogue">
<div class="chips" id="filterChips"></div>
</section>

<main id="groupsContainer"></main>

<footer id="site-footer"></footer>

<script>window.PAGE_META = { slug: null };</script>
<script src="components/experiences-data.js"></script>
<script src="components/header.js"></script>
<script src="components/footer.js"></script>
<script>
(function () {
  function ready(fn) {
    if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', fn); }
    else { fn(); }
  }

  function esc(s) { return (s || '').replace(/[&<>"']/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]; }); }

  function cardHTML(e, groupKey) {
    var moods = (e.moods || []).join(' ');
    var tags = (e.tags || []).join(' ');
    return '<a class="exp-card" href="' + e.href + '" data-group="' + groupKey + '" data-country="' + (e.country || '') +
      '" data-tags="' + esc(tags) + '" data-moods="' + esc(moods) + '" data-title="' + esc(e.title.toLowerCase()) + '">' +
      '<span class="exp-card-icon" aria-hidden="true">' + e.icon + '</span>' +
      '<span class="exp-card-content"><span class="exp-card-title">' + esc(e.title) + '</span>' +
      '<span class="exp-card-tag">' + esc(e.tagline) + '</span></span></a>';
  }

  function buildGroup(container, id, title, list, groupKey, featured) {
    if (!list.length) return;
    var section = document.createElement('section');
    section.className = 'group' + (featured ? ' featured-group' : '');
    section.id = id;
    var grid = list.map(function (e) { return cardHTML(e, groupKey); }).join('');
    section.innerHTML = '<h2 class="group-title">' + title + ' <span class="group-count">(' + list.length + ')</span></h2>' +
      '<div class="grid">' + grid + '</div>';
    container.appendChild(section);
  }

  function init() {
    var EXPERIENCES = window.PLAYRIUM_EXPERIENCES || [];
    var container = document.getElementById('groupsContainer');

    var originals = EXPERIENCES.filter(function (e) { return e.country === null; });
    var india = EXPERIENCES.filter(function (e) { return e.country === 'India'; });
    var japan = EXPERIENCES.filter(function (e) { return e.country === 'Japan'; });
    var philippines = EXPERIENCES.filter(function (e) { return e.country === 'Philippines'; });
    var relax = EXPERIENCES.filter(function (e) { return window.PLAYRIUM_isRelax(e); });
    // TODO: Replace array-order logic with createdAt metadata
    // once the experience registry supports timestamps.
    var recentlyAdded = EXPERIENCES.slice(-4).reverse();

    buildGroup(container, 'group-originals', '✨ Playrium Originals — Featured', originals, 'curated', true);
    buildGroup(container, 'group-india', '🇮🇳 India', india, 'curated', false);
    buildGroup(container, 'group-japan', '🇯🇵 Japan', japan, 'curated', false);
    buildGroup(container, 'group-philippines', '🇵🇭 Philippines', philippines, 'curated', false);
    buildGroup(container, 'group-relax', '🌿 Relax & Satisfy', relax, 'curated', false);
    buildGroup(container, 'group-recent', '🆕 Recently Added', recentlyAdded, 'curated', false);
    buildGroup(container, 'group-all', '📚 All Experiences', EXPERIENCES, 'all', false);

    var emptyState = document.createElement('p');
    emptyState.className = 'empty-state';
    emptyState.id = 'emptyState';
    emptyState.style.display = 'none';
    emptyState.textContent = 'No experiences match your search.';
    container.appendChild(emptyState);

    var CHIPS = [
      { id: 'all', label: 'All' },
      { id: 'originals', label: 'Originals' },
      { id: 'India', label: 'India' },
      { id: 'Japan', label: 'Japan' },
      { id: 'Philippines', label: 'Philippines' },
      { id: 'relaxing', label: 'Relaxing' },
      { id: 'skill', label: 'Skill' },
      { id: 'physics', label: 'Physics' },
      { id: 'creative', label: 'Creative' },
      { id: 'family', label: 'Family' }
    ];
    var chipsEl = document.getElementById('filterChips');
    var activeChip = 'all';
    CHIPS.forEach(function (c) {
      var b = document.createElement('button');
      b.type = 'button';
      b.className = 'chip' + (c.id === 'all' ? ' active' : '');
      b.textContent = c.label;
      b.dataset.chip = c.id;
      b.setAttribute('aria-pressed', c.id === 'all' ? 'true' : 'false');
      b.addEventListener('click', function () {
        activeChip = c.id;
        Array.prototype.forEach.call(chipsEl.children, function (el) {
          el.classList.toggle('active', el === b);
          el.setAttribute('aria-pressed', el === b ? 'true' : 'false');
        });
        applyFilters();
      });
      chipsEl.appendChild(b);
    });

    function matchesChip(card, chip) {
      if (chip === 'all') return true;
      if (chip === 'originals') return card.dataset.country === '';
      if (chip === 'India' || chip === 'Japan' || chip === 'Philippines') return card.dataset.country === chip;
      var tags = card.dataset.tags || '', moods = card.dataset.moods || '';
      if (chip === 'relaxing') return moods.indexOf('relax') > -1 || moods.indexOf('satisfying') > -1;
      if (chip === 'skill') return tags.indexOf('skill') > -1;
      if (chip === 'physics') return tags.indexOf('physics') > -1 || moods.indexOf('physics') > -1;
      if (chip === 'creative') return tags.indexOf('creative') > -1 || moods.indexOf('creative') > -1;
      if (chip === 'family') return moods.indexOf('family') > -1;
      return true;
    }

    function matchesSearch(card, q) {
      if (!q) return true;
      q = q.toLowerCase();
      return card.dataset.title.indexOf(q) > -1 ||
        (card.dataset.country || '').toLowerCase().indexOf(q) > -1 ||
        (card.dataset.tags || '').toLowerCase().indexOf(q) > -1 ||
        (card.dataset.moods || '').toLowerCase().indexOf(q) > -1 ||
        (q === 'originals' && card.dataset.country === '');
    }

    var searchInput = document.getElementById('expSearchInput');

    function applyFilters() {
      var q = searchInput.value.trim();
      var anyVisible = false;
      var cards = container.querySelectorAll('.exp-card');
      Array.prototype.forEach.call(cards, function (card) {
        var searchOk = matchesSearch(card, q);
        var chipOk = card.dataset.group === 'all' ? matchesChip(card, activeChip) : true;
        var visible = searchOk && chipOk;
        card.classList.toggle('is-hidden', !visible);
        if (visible) anyVisible = true;
      });
      var groups = container.querySelectorAll('.group');
      Array.prototype.forEach.call(groups, function (g) {
        var visibleCards = g.querySelectorAll('.exp-card:not(.is-hidden)');
        g.classList.toggle('is-hidden', visibleCards.length === 0);
      });
      document.getElementById('emptyState').style.display = anyVisible ? 'none' : 'block';
    }

    searchInput.addEventListener('input', applyFilters);
  }

  ready(init);
})();
</script>

</body>
