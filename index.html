<style>
:root{
  --bg-deep:#0a0a0f; --bg-mid:#141420;
  --chalk:#f4f0e6; --chalk-dim:#9a97a8;
  --ui-glass:rgba(244,240,230,.06); --ui-glass-border:rgba(244,240,230,.14);
  --font-display:'Fredoka', system-ui, sans-serif; --font-chalk:'Kalam', cursive;
}
*{box-sizing:border-box;}
html,body{ margin:0; padding:0; width:100%; min-height:100%; background:var(--bg-deep);
  font-family:var(--font-display); -webkit-tap-highlight-color:transparent; }
body{ overflow-x:hidden; }
.bg-glow{ position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(circle at 20% 20%, rgba(240,193,75,.10), transparent 40%),
    radial-gradient(circle at 80% 10%, rgba(180,255,240,.06), transparent 45%),
    radial-gradient(circle at 50% 90%, rgba(232,122,60,.05), transparent 50%);
}

.bg-decor{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.bg-decor svg{ position:absolute; filter:drop-shadow(0 6px 12px rgba(0,0,0,.35)); }
.deco-kite{ opacity:.16; }
.deco-flower{ opacity:.22; }
.k1{ top:7%; left:5%; width:64px; animation:kiteFloat 7.5s ease-in-out infinite; }
.k2{ top:13%; right:7%; width:50px; animation:kiteFloat 9s ease-in-out infinite 1.1s; }
.k3{ top:47%; left:3.5%; width:38px; opacity:.12; animation:kiteFloat 8.2s ease-in-out infinite .6s; }
.k4{ top:62%; right:5%; width:46px; animation:kiteFloat 8.8s ease-in-out infinite .3s; }
.f1{ top:23%; left:15%; width:30px; animation:sway 6.4s ease-in-out infinite; }
.f2{ top:9%; right:21%; width:24px; animation:sway 7.1s ease-in-out infinite 1.3s; }
.f3{ top:39%; right:16%; width:34px; animation:sway 7.8s ease-in-out infinite .8s; }
.f4{ top:66%; left:11%; width:26px; animation:sway 6.7s ease-in-out infinite .4s; }
.f5{ top:81%; right:10%; width:30px; animation:sway 7.4s ease-in-out infinite 1s; }
@keyframes kiteFloat{ 0%,100%{ transform:translateY(0) rotate(-7deg); } 50%{ transform:translateY(14px) rotate(5deg); } }
@keyframes sway{ 0%,100%{ transform:rotate(-9deg); } 50%{ transform:rotate(9deg); } }

header{ position:relative; z-index:1; text-align:center; padding:5rem 1.5rem 3rem; }
.eyebrow{ color:var(--chalk); opacity:.7; letter-spacing:.3em; text-transform:uppercase; font-size:.75rem;
  font-weight:500; margin:0 0 1rem; animation:fadeUp .8s ease both; }
.logo{ font-weight:700; color:var(--chalk); font-size:clamp(2.6rem,7vw,5.2rem); margin:0; letter-spacing:-.01em;
  text-shadow:0 4px 40px rgba(240,193,75,.15); animation:fadeUp .9s cubic-bezier(.2,.8,.2,1) .1s both; }
.tagline{ font-family:var(--font-chalk); color:var(--chalk-dim); font-size:clamp(1rem,2.3vw,1.3rem);
  margin:1.2rem 0 0; opacity:.85; animation:fadeUp .9s ease .35s both; }
@keyframes fadeUp{ from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:translateY(0);} }
.grid{ position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:1rem 1.5rem 6rem;
  display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:1.75rem; }
.card{ position:relative; display:block; border-radius:1.4rem; overflow:hidden; text-decoration:none;
  aspect-ratio:4/3; background:#1a1a24; border:1px solid var(--ui-glass-border);
  box-shadow:0 20px 40px rgba(0,0,0,.35);
  opacity:0; transform:translateY(20px); animation:cardIn .7s cubic-bezier(.2,.8,.2,1) forwards;
  transition:transform .35s cubic-bezier(.2,.8,.2,1), box-shadow .35s ease, border-color .35s ease; }
@keyframes cardIn{ to{ opacity:1; transform:translateY(0); } }
.card:hover{ transform:translateY(-6px) scale(1.015); box-shadow:0 28px 60px rgba(0,0,0,.55); }
.card.locked{ cursor:default; }
.card.locked:hover{ transform:none; box-shadow:0 20px 40px rgba(0,0,0,.35); }
.card-flag{ position:absolute; right:1.1rem; bottom:1.1rem; left:auto; top:auto; width:auto; height:auto; display:flex; align-items:center; justify-content:center; z-index:2;
  transition:transform .6s cubic-bezier(.2,.8,.2,1), filter .4s ease; filter:saturate(1.02) brightness(.94); opacity:.9; }
.card-flag svg, .card-flag img{ width:3.4rem; height:auto; border-radius:.4rem; box-shadow:0 6px 16px rgba(0,0,0,.5); object-fit:cover; }
.card:not(.locked):hover .card-flag{ transform:scale(1.06); filter:saturate(1.1) brightness(1); }
.card.locked .card-flag{ filter:grayscale(.7) brightness(.55); }
.card::before{ content:''; position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,0) 40%, rgba(10,10,15,.55) 70%, rgba(10,10,15,.92) 100%); z-index:1; pointer-events:none; }
.card::after{ content:''; position:absolute; inset:0; border-radius:1.4rem; z-index:2; pointer-events:none;
  box-shadow:inset 0 0 0 1.5px transparent; transition:box-shadow .35s ease; }
.card:not(.locked):hover::after{ box-shadow:inset 0 0 0 1.5px var(--accent), 0 0 24px var(--accent); }
.card-content{ position:absolute; left:0; right:0; bottom:0; z-index:3; padding:1.3rem 1.4rem 1.2rem;
  display:flex; flex-direction:column; gap:.35rem; }
.accent-dot{ width:9px; height:9px; border-radius:50%; background:var(--accent); display:inline-block;
  margin-right:.5rem; box-shadow:0 0 12px var(--accent); }
.card-title{ color:var(--chalk); font-weight:600; font-size:1.35rem; margin:0; display:flex; align-items:center; }
.card-tagline{ font-family:var(--font-chalk); color:var(--chalk-dim); font-size:.88rem; margin:0; }
.card-count{ font-family:var(--font-chalk); color:var(--chalk-dim); font-size:.78rem; margin:.1rem 0 0; opacity:.7; }
.card-cta{ margin-top:.5rem; align-self:flex-start; padding:.4rem 1rem; border-radius:999px; font-size:.78rem;
  font-weight:600; color:#0a0a0f; background:var(--chalk); opacity:0; transform:translateY(6px);
  transition:all .35s cubic-bezier(.2,.8,.2,1); }
.card:not(.locked):hover .card-cta{ opacity:1; transform:translateY(0); }
.card-badge{ margin-top:.5rem; align-self:flex-start; padding:.4rem 1rem; border-radius:999px; font-size:.78rem;
  font-weight:600; color:var(--chalk-dim); background:rgba(244,240,230,.1); border:1px solid var(--ui-glass-border); }
footer{ position:relative; z-index:1; text-align:center; padding:3rem 1.5rem 3rem; color:var(--chalk-dim); }
@media (prefers-reduced-motion:reduce){
  *{ animation-duration:.001s !important; transition-duration:.001s !important; }
}
</style>

<header>
  <p class="eyebrow">Playrium</p>
  <h1 class="logo">Interactive Experiences.<br>Not Games.</h1>

</header>
<div class="grid" id="grid"></div>
<footer><p>Playrium &middot; built with vanilla HTML, CSS &amp; JavaScript &middot; no frameworks, no backend</p></footer>
<script>
const INDIA_FLAG = '<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg"><rect width="900" height="200" fill="#FF9933"/><rect y="200" width="900" height="200" fill="#FFFFFF"/><rect y="400" width="900" height="200" fill="#138808"/><circle cx="450" cy="300" r="60" fill="none" stroke="#000080" stroke-width="5"/><circle cx="450" cy="300" r="6" fill="#000080"/></svg>';
const JAPAN_FLAG = '<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg"><rect width="900" height="600" fill="#FFFFFF"/><circle cx="450" cy="300" r="120" fill="#BC002D"/></svg>';
function flagImg(code){
  return '<img src="https://flagcdn.com/' + code.toLowerCase() + '.svg" alt="' + code + ' flag" loading="lazy">';
}
const COUNTRIES = [
  { title:'India', tagline:'Twelve premium physics-driven toys.', count:'12 experiences', href:'india.html', accent:'#f0c14b', flag:INDIA_FLAG, live:true },
  { title:'Japan', tagline:'Toys inspired by Japanese festivals and craft.', count:'4 experiences', href:'japan.html', accent:'#ff6b5e', flag:JAPAN_FLAG, live:true },
  { title:'China', tagline:'Coming soon.', code:'CN', accent:'#DE2910', live:false },
  { title:'South Korea', tagline:'Coming soon.', code:'KR', accent:'#0047A0', live:false },
  { title:'Thailand', tagline:'Coming soon.', code:'TH', accent:'#A51931', live:false },
  { title:'Vietnam', tagline:'Coming soon.', code:'VN', accent:'#DA251D', live:false },
  { title:'Indonesia', tagline:'Coming soon.', code:'ID', accent:'#CE1126', live:false },
  { title:'Philippines', tagline:'Coming soon.', code:'PH', accent:'#0038A8', live:false },
  { title:'Malaysia', tagline:'Coming soon.', code:'MY', accent:'#010066', live:false },
  { title:'Singapore', tagline:'Coming soon.', code:'SG', accent:'#EF3340', live:false },
  { title:'Nepal', tagline:'Coming soon.', code:'NP', accent:'#DC143C', live:false },
  { title:'Bhutan', tagline:'Coming soon.', code:'BT', accent:'#FFA500', live:false },
  { title:'Mongolia', tagline:'Coming soon.', code:'MN', accent:'#C4272F', live:false },
  { title:'Australia', tagline:'Coming soon.', code:'AU', accent:'#00247D', live:false },
  { title:'New Zealand', tagline:'Coming soon.', code:'NZ', accent:'#00247D', live:false },
  { title:'Ghana', tagline:'Coming soon.', code:'GH', accent:'#FCD116', live:false },
  { title:'South Africa', tagline:'Coming soon.', code:'ZA', accent:'#007A4D', live:false },
  { title:'Kenya', tagline:'Coming soon.', code:'KE', accent:'#BB0000', live:false },
  { title:'Nigeria', tagline:'Coming soon.', code:'NG', accent:'#008751', live:false },
  { title:'Morocco', tagline:'Coming soon.', code:'MA', accent:'#C1272D', live:false },
  { title:'Egypt', tagline:'Coming soon.', code:'EG', accent:'#C09300', live:false },
  { title:'Türkiye', tagline:'Coming soon.', code:'TR', accent:'#E30A17', live:false },
  { title:'Greece', tagline:'Coming soon.', code:'GR', accent:'#0D5EAF', live:false },
  { title:'Italy', tagline:'Coming soon.', code:'IT', accent:'#008C45', live:false },
  { title:'France', tagline:'Coming soon.', code:'FR', accent:'#0055A4', live:false },
  { title:'Spain', tagline:'Coming soon.', code:'ES', accent:'#AA151B', live:false },
  { title:'United Kingdom', tagline:'Coming soon.', code:'GB', accent:'#012169', live:false },
  { title:'Ireland', tagline:'Coming soon.', code:'IE', accent:'#169B62', live:false },
  { title:'Germany', tagline:'Coming soon.', code:'DE', accent:'#FFCE00', live:false },
  { title:'Mexico', tagline:'Coming soon.', code:'MX', accent:'#006847', live:false },
  { title:'Brazil', tagline:'Coming soon.', code:'BR', accent:'#009C3B', live:false },
  { title:'USA', tagline:'Coming soon.', code:'US', accent:'#3C3B6E', live:false },
  { title:'Canada', tagline:'Coming soon.', code:'CA', accent:'#FF0000', live:false },
];
const grid = document.getElementById('grid');
COUNTRIES.forEach((c, i) => {
  const el = document.createElement(c.live ? 'a' : 'div');
  el.className = 'card' + (c.live ? '' : ' locked');
  if (c.live) el.href = c.href;
  el.style.setProperty('--accent', c.accent);
  el.style.animationDelay = (i * 0.03) + 's';
  const icon = c.flag || flagImg(c.code);
  el.innerHTML = `
    <div class="card-flag">${icon}</div>
    <div class="card-content">
      <p class="card-title"><span class="accent-dot"></span>${c.title}</p>
      <p class="card-tagline">${c.tagline}</p>
      ${c.live ? '<p class="card-count">' + c.count + '</p><span class="card-cta">Explore &rarr;</span>' : '<span class="card-badge">Coming Soon</span>'}
    </div>
  `;
  grid.appendChild(el);
});
</script>
