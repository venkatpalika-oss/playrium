<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Playrium — Interactive Experiences, Not Games</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-deep:#0a0a0f; --bg-mid:#141420;
  --chalk:#f4f0e6; --chalk-dim:#9a97a8;
  --ui-glass:rgba(244,240,230,.06); --ui-glass-border:rgba(244,240,230,.14);
  --font-display:'Fredoka', system-ui, sans-serif; --font-chalk:'Kalam', cursive;
}
*{box-sizing:border-box;}
html,body{ margin:0; padding:0; width:100%; min-height:100%; background:var(--bg-deep);
  font-family:var(--font-display); -webkit-tap-highlight-color:transparent; }
body{ overflow-x:hidden; }

.bg-glow{ position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(60% 40% at 50% -5%, rgba(240,193,75,.10), transparent 60%),
    radial-gradient(50% 35% at 85% 15%, rgba(90,180,255,.06), transparent 60%),
    radial-gradient(45% 30% at 10% 30%, rgba(232,99,122,.05), transparent 60%);
}

header{ position:relative; z-index:2; text-align:center; padding:9vh 20px 6vh; }
.eyebrow{ color:var(--chalk); opacity:.6; letter-spacing:.2em; text-transform:uppercase; font-size:.75rem;
  font-weight:500; margin:0 0 1em; animation: fadeUp .7s ease both; }
.logo{ font-weight:700; color:var(--chalk); font-size:clamp(2.6rem,9vw,5.2rem); margin:0; letter-spacing:.01em;
  text-shadow:0 10px 40px rgba(0,0,0,.5); animation: fadeUp .8s cubic-bezier(.2,.9,.3,1) both .1s; }
.tagline{ font-family:var(--font-chalk); color:var(--chalk-dim); font-size:clamp(1rem,2.3vw,1.3rem);
  margin:.6em 0 0; opacity:0; animation: fadeUp .7s ease both .35s; }
@keyframes fadeUp{ from{ opacity:0; transform:translateY(18px);} to{ opacity:1; transform:translateY(0);} }

.grid{ position:relative; z-index:2; max-width:1200px; margin:0 auto; padding:0 20px 10vh;
  display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:26px; }

.card{ position:relative; display:block; border-radius:20px; overflow:hidden; text-decoration:none;
  aspect-ratio:16/10; background:#1a1a24; border:1px solid var(--ui-glass-border);
  box-shadow:0 16px 40px rgba(0,0,0,.4);
  opacity:0; transform:translateY(24px);
  animation: cardIn .7s cubic-bezier(.2,.9,.3,1) forwards;
  transition: transform .35s cubic-bezier(.2,1,.3,1), box-shadow .35s ease, border-color .35s ease;
}
@keyframes cardIn{ to{ opacity:1; transform:translateY(0); } }
.card:hover{ transform:translateY(-8px) scale(1.015); box-shadow:0 26px 60px rgba(0,0,0,.55); }

.card img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
  transition: transform .6s cubic-bezier(.2,1,.3,1), filter .4s ease; filter:saturate(1.02) brightness(.94); }
.card:hover img{ transform:scale(1.06); filter:saturate(1.1) brightness(1); }

.card::before{ content:''; position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(10,10,15,0) 15%, rgba(10,10,15,.6) 45%, rgba(10,10,15,.85) 68%, rgba(10,10,15,.97) 100%);
  z-index:1; pointer-events:none; }

.card::after{ content:''; position:absolute; inset:0; border-radius:20px; z-index:1; pointer-events:none;
  box-shadow:0 0 0 1.5px transparent inset; transition: box-shadow .35s ease; }
.card:hover::after{ box-shadow:0 0 0 1.5px var(--accent) inset, 0 0 26px -4px var(--accent); }

.card-content{ position:absolute; left:0; right:0; bottom:0; z-index:2; padding:1.6em 1.4em 1.2em;
  display:flex; flex-direction:column; gap:.3em;
  background:linear-gradient(180deg, rgba(10,10,15,0) 0%, rgba(10,10,15,.55) 35%, rgba(10,10,15,.88) 100%); }
.accent-dot{ width:8px; height:8px; border-radius:50%; background:var(--accent); display:inline-block;
  margin-right:.5em; box-shadow:0 0 10px var(--accent); }
.card-title{ color:var(--chalk); font-weight:600; font-size:1.35rem; margin:0; display:flex; align-items:center; }
.card-tagline{ font-family:var(--font-chalk); color:var(--chalk-dim); font-size:.88rem; margin:0; }
.card-cta{ margin-top:.5em; align-self:flex-start; padding:.4em 1em; border-radius:999px; font-size:.78rem;
  font-weight:600; color:#0a0a0f; background:var(--chalk); opacity:0; transform:translateY(6px);
  transition: all .3s cubic-bezier(.2,1,.3,1); }
.card:hover .card-cta{ opacity:1; transform:translateY(0); }

footer{ position:relative; z-index:2; text-align:center; padding:4vh 20px 8vh; color:var(--chalk-dim);
  font-size:.82rem; font-family:var(--font-chalk); }

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:.001ms !important; transition-duration:.001ms !important; }
}
</style>
</head>

</header>

const grid = document.getElementById('grid');
